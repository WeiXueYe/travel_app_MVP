<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 100种不可思议旅行 MVP - 立即体验</title>
    <style>
        body {
            background: linear-gradient(135deg, #000, #1a1a1a);
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .hero {
            text-align: center;
            padding: 60px 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.1) 0%, transparent 50%);
        }
        .title {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fff, #ccc, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            font-weight: 300;
        }
        .subtitle {
            font-size: 1.3rem;
            opacity: 0.9;
            margin-bottom: 40px;
            font-style: italic;
        }
        .filter-bar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            margin: 40px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .filter-bar h2 {
            text-align: center;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .filter-tag {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 25px;
            font-size: 0.95rem;
            position: relative;
            overflow: hidden;
        }
        .filter-tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }
        .filter-tag:hover {
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .filter-tag:hover::before {
            left: 100%;
        }
        .filter-tag.active {
            background: linear-gradient(45deg, #fff, #ddd);
            color: #000;
            border-color: transparent;
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
        }
        .travel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            padding: 40px 0;
        }
        .travel-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
        }
        .travel-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.05));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .travel-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .travel-card:hover::after {
            opacity: 1;
        }
        .card-image {
            height: 280px;
            overflow: hidden;
            position: relative;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
            filter: grayscale(10%) brightness(0.9);
        }
        .travel-card:hover .card-image img {
            transform: scale(1.15);
            filter: grayscale(0%) brightness(1.1);
        }
        .card-content {
            padding: 30px;
            position: relative;
            z-index: 2;
        }
        .card-title {
            font-size: 1.6rem;
            font-weight: 300;
            margin-bottom: 15px;
            line-height: 1.3;
            color: #fff;
        }
        .visual-hook {
            font-style: italic;
            opacity: 0.95;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #e0e0e0;
            border-left: 3px solid rgba(255, 255, 255, 0.5);
            padding-left: 15px;
        }
        .story-preview {
            opacity: 0.85;
            line-height: 1.7;
            margin-bottom: 25px;
            color: #d0d0d0;
            font-size: 1rem;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag {
            padding: 6px 16px;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            border-radius: 20px;
            font-size: 0.85rem;
            opacity: 0.9;
            transition: all 0.3s ease;
        }
        .tag:hover {
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.15));
            transform: translateY(-1px);
        }
        .loading {
            text-align: center;
            font-size: 1.4rem;
            opacity: 0.8;
            padding: 80px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .status-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            max-width: 1000px;
            width: 90%;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 25px;
            padding: 50px;
            position: relative;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            .travel-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .card-content {
                padding: 20px;
            }
            .modal-content {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1 class="title">🎨 100种不可思议旅行</h1>
            <p class="subtitle">在世界的边缘，发现内心的奇迹</p>
        </div>

        <!-- API状态显示 -->
        <div class="status-info" id="status-info">
            🚀 MVP状态: 后端API运行中 | 端口: 8080 | 前端框架就绪
        </div>

        <div class="filter-bar">
            <h2>多维智能筛选系统</h2>
            <div class="filter-tags" id="filters">
                <div class="filter-tag active" onclick="selectFilter('Extreme')">极限挑战 Extreme</div>
                <div class="filter-tag" onclick="selectFilter('Sensory')">感官刺激 Sensory</div>
                <div class="filter-tag" onclick="selectFilter('Nature')">自然奇观 Nature</div>
                <div class="filter-tag" onclick="selectFilter('Cultural')">文化震撼 Cultural</div>
                <div class="filter-tag" onclick="selectFilter('Healing')">心灵治愈 Healing</div>
            </div>
        </div>

        <div id="travel-grid" class="travel-grid">
            <!-- 旅行卡片将通过JavaScript动态生成 -->
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modal-content">
                <!-- 弹窗内容将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <script>
        let currentFilters = [];
        let allTravels = [];

        // 初始化状态信息
        document.getElementById('status-info').innerHTML = `
            ✅ API连接成功！<br>
            📊 数据状态: 等待加载...<br>
            🎯 筛选维度: 体验类型、视觉风格、小众程度、情感基调<br>
            💡 提示: 点击筛选标签或旅行卡片开始体验
        `;

        async function fetchTravels() {
            try {
                console.log('🔍 开始获取旅行数据...');
                const response = await fetch('http://localhost:8000/api/v1/travels');
                const data = await response.json();

                console.log(`✅ 成功获取 ${data.length} 条旅行数据`);
                allTravels = data;
                updateStatusInfo(data);

                if (data.length > 0) {
                    displayTravels(data);
                } else {
                    showError('没有找到旅行数据');
                }

            } catch (error) {
                console.error('❌ API连接失败:', error);
                showError('API连接失败，请检查后端服务器是否运行');
            }
        }

        function updateStatusInfo(data) {
            const statusElement = document.getElementById('status-info');
            const types = [...new Set(data.map(t => t.experience_type).filter(Boolean))];
            const styles = [...new Set(data.map(t => t.visual_style).filter(Boolean))];

            statusElement.innerHTML = `
                ✅ API连接成功！<br>
                📊 数据状态: 已加载 ${data.length} 条记录<br>
                🏷️ 体验类型: ${types.join(', ') || 'N/A'}<br>
                🎨 视觉风格: ${styles.join(', ') || 'N/A'}<br>
                💡 提示: 点击筛选标签或旅行卡片开始体验
            `;
        }

        function showError(message) {
            const grid = document.getElementById('travel-grid');
            grid.innerHTML = `<div class="loading">${message}</div>`;
        }

        function selectFilter(type) {
            console.log(`🔄 选择筛选条件: ${type}`);
            if (currentFilters.includes(type)) {
                currentFilters = currentFilters.filter(f => f !== type);
                console.log(`➖ 移除筛选: ${type}, 当前筛选: [${currentFilters}]`);
            } else {
                currentFilters.push(type);
                console.log(`➕ 添加筛选: ${type}, 当前筛选: [${currentFilters}]`);
            }

            // 更新UI状态
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
            });
            if (currentFilters.length > 0) {
                currentFilters.forEach(filter => {
                    const element = document.querySelector(`[onclick*="${filter}"]`);
                    if (element) element.classList.add('active');
                });
            }

            filterTravels();
        }

        function filterTravels() {
            if (currentFilters.length === 0) {
                displayTravels(allTravels);
                return;
            }

            const filtered = allTravels.filter(travel =>
                currentFilters.includes(travel.experience_type)
            );
            console.log(`🔍 筛选结果: ${filtered.length}/${allTravels.length} 条记录`);
            displayTravels(filtered);
        }

        function displayTravels(travels) {
            const grid = document.getElementById('travel-grid');

            if (travels.length === 0) {
                grid.innerHTML = '<div class="loading">😔 没有找到符合条件的旅行内容<br><small>尝试清除筛选条件</small></div>';
                return;
            }

            grid.innerHTML = '';

            travels.forEach((travel, index) => {
                const card = document.createElement('div');
                card.className = 'travel-card';
                card.innerHTML = `
                    <div class="card-image">
                        <img src="${travel.cover_url}" alt="${travel.title}">
                        <div style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); color: #fff; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem;">
                            #${travel.id}
                        </div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${travel.title}</h3>
                        <p class="visual-hook">${travel.visual_hook}</p>
                        <p class="story-preview">${travel.content_story.substring(0, 180)}...</p>
                        <div class="card-tags">
                            ${travel.experience_type ? `<span class="tag">${travel.experience_type}</span>` : ''}
                            ${travel.visual_style ? `<span class="tag">${travel.visual_style}</span>` : ''}
                            ${travel.emotional_tone ? `<span class="tag">${travel.emotional_tone}</span>` : ''}
                            ${travel.rarity_level ? `<span class="tag">${travel.rarity_level}</span>` : ''}
                        </div>
                    </div>
                `;

                // 添加点击事件
                card.addEventListener('click', () => showDetail(travel));
                grid.appendChild(card);

                // 添加延迟动画效果
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 100);
            });

            console.log(`🎨 成功渲染 ${travels.length} 个旅行卡片`);
        }

        function showDetail(travel) {
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = `
                <div class="detail-hero" style="text-align: center; margin-bottom: 40px;">
                    <img src="${travel.cover_url}" alt="${travel.title}" style="max-width: 100%; max-height: 350px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <h1 style="font-size: 3rem; margin-bottom: 20px;">${travel.title}</h1>
                    <p style="font-style: italic; font-size: 1.4rem; opacity: 0.95; color: #e0e0e0; margin-bottom: 25px; line-height: 1.6;">${travel.visual_hook}</p>
                    <div style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;">
                        ${travel.experience_type ? `<span style="padding: 10px 25px; background: linear-gradient(45deg, #fff, #ddd); color: #000; border-radius: 30px; font-weight: 600; font-size: 1.1rem;">${travel.experience_type}</span>` : ''}
                        ${travel.visual_style ? `<span style="padding: 10px 25px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); color: #fff; border-radius: 30px; font-weight: 500;">${travel.visual_style}</span>` : ''}
                        ${travel.emotional_tone ? `<span style="padding: 10px 25px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; border-radius: 30px; font-weight: 500;">${travel.emotional_tone}</span>` : ''}
                    </div>
                </div>

                <div style="margin-bottom: 45px;">
                    <h2 style="font-size: 2rem; margin-bottom: 25px; color: #fff; border-bottom: 2px solid rgba(255, 255, 255, 0.2); padding-bottom: 10px;">沉浸式体验故事</h2>
                    <p style="line-height: 2; font-size: 1.2rem; text-align: justify; color: #e0e0e0;">${travel.content_story}</p>
                </div>

                ${travel.gallery_urls && travel.gallery_urls.length > 0 ? `
                <div>
                    <h3 style="font-size: 1.8rem; margin-bottom: 25px; color: #fff;">视觉画廊</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
                        ${travel.gallery_urls.map(url => `
                            <div style="border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.3s ease;">
                                <img src="${url}" alt="Gallery image" style="width: 100%; height: 200px; object-fit: cover;" onmouseover="this.parentElement.style.transform='scale(1.05)'" onmouseout="this.parentElement.style.transform='scale(1)'">
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                <div style="margin-top: 40px; padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);">
                    <p style="opacity: 0.8; font-size: 0.9rem; text-align: center;">
                        ✨ 这是一次真正不可思议的旅行体验<br>
                        🌍 探索那些令人震撼的独特目的地<br>
                        💫 感受内心的平静与震撼
                    </p>
                </div>
            `;

            document.getElementById('modal-overlay').style.display = 'flex';

            // 添加平滑过渡
            setTimeout(() => {
                document.getElementById('modal-content').style.opacity = '1';
                document.getElementById('modal-content').style.transform = 'scale(1)';
            }, 100);
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-content').style.opacity = '0';
            document.getElementById('modal-content').style.transform = 'scale(0.95)';
        }

        // ESC键关闭弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 MVP体验页面已加载');
            fetchTravels();
        });
    </script>
</body>
</html>
